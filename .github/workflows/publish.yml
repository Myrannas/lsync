name: Publish npm packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: npm distribution tag
        required: true
        default: latest
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: false
          run-install: false
          registry-url: "https://registry.npmjs.org"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: vp install
      - run: vp run check
      - run: vp test
      - run: vp run e2e
      - run: vp run build:packages

      - name: Publish unpublished package versions
        run: node scripts/publish-packages.ts --tag "${{ inputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
